<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SWIFT | XENO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --pink: #d42a8b; --purple: #7b2cbf; --bg: #0f051d; --card: #1a0b2e; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); color:white; overflow-x:hidden; transition: 0.5s; }
        
        /* خلفية الهاك الرقمية لصفحة الدخول */
        .matrix-bg { background: linear-gradient(rgba(15, 5, 29, 0.9), rgba(15, 5, 29, 0.9)), url('https://i.makeagif.com/media/12-28-2015/v-3InG.gif'); background-size: cover; }

        header { position:fixed; top:0; width:100%; padding:15px 5%; background:rgba(26,11,46,0.95); display:none; justify-content:space-between; align-items:center; z-index:1000; border-bottom:2px solid var(--pink); }

        /* سلة المشتريات الجانبية */
        .cart-sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100%; background: var(--card); z-index: 3000; transition: 0.4s; padding: 20px; border-right: 2px solid var(--pink); }
        .cart-sidebar.open { left: 0; }

        section { display:none; padding:120px 5% 50px; min-height:100vh; flex-direction:column; align-items:center; }
        .active { display:flex; animation: fadeIn 0.5s ease; }

        /* تصميم كرت المنتج الصغير */
        .mini-card { background:var(--card); border:1px solid #333; padding:15px; border-radius:15px; width:260px; transition: 0.3s; cursor: pointer; text-align: center; }
        .mini-card:hover { border-color: var(--pink); transform: scale(1.02); }
        .mini-card img { width:100%; border-radius:10px; margin-bottom:10px; pointer-events: none; }

        .btn-main { background:linear-gradient(90deg, var(--pink), var(--purple)); color:white; border:none; padding:12px; border-radius:10px; font-weight:700; cursor:pointer; width:100%; }
        
        /* نظام النجوم للتقييم */
        .star-rating { color: #ffcc00; font-size: 20px; cursor: pointer; margin: 10px 0; }
        .rev-card { background: rgba(123, 44, 191, 0.1); padding: 20px; border-radius: 15px; border-right: 4px solid var(--pink); margin-bottom: 15px; width: 100%; max-width: 600px; }

        /* تنبيهات الموقع (بديل جوجل) */
        .site-alert { position: fixed; top: 20px; right: 20px; background: var(--pink); padding: 15px 25px; border-radius: 10px; z-index: 5000; display: none; animation: slideIn 0.3s ease; }

        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        @keyframes slideIn { from {right:-100%;} to {right:20px;} }
    </style>
</head>
<body class="matrix-bg" id="bodyTag">

<div class="site-alert" id="siteAlert"></div>

<div class="cart-sidebar" id="cartSidebar">
    <h3>سلة المشتريات</h3>
    <hr style="margin:20px 0; border:1px solid #333;">
    <div id="cartItems"><p style="color:grey; text-align:center;">السلة فارغة</p></div>
    <div style="position:absolute; bottom:20px; width:calc(100% - 40px);">
        <button class="btn-main" onclick="show('checkout')">إتمام الشراء والدفع</button>
    </div>
</div>

<header id="navbar">
    <div style="font-weight:900; color:var(--pink); font-size:24px;">VOID SWIFT</div>
    <div style="display:flex; gap:25px; align-items:center;">
        <i class="fas fa-shopping-bag" onclick="toggleCart()" style="cursor:pointer; font-size:22px;"></i>
        <div id="user-info" style="font-weight:700;"></div>
    </div>
</header>

<section id="auth-page" class="active" style="justify-content:center;">
    <div style="background:rgba(10,4,20,0.9); border:2px solid var(--pink); padding:40px; border-radius:20px; width:400px; text-align:center;">
        <h1 style="color:var(--pink); margin-bottom:30px; letter-spacing:5px;">AUTH_REQUIRED</h1>
        <input type="email" id="uEmail" style="width:100%; padding:15px; margin-bottom:15px; background:#000; border:1px solid var(--purple); color:var(--pink);" placeholder="USER_EMAIL">
        <input type="password" id="uPass" style="width:100%; padding:15px; margin-bottom:20px; background:#000; border:1px solid var(--purple); color:var(--pink);" placeholder="PASSWORD">
        <button onclick="handleAuth()" class="btn-main">EXECUTE_LOGIN</button>
    </div>
</section>

<section id="home-page">
    <div style="display:flex; flex-wrap:wrap; gap:30px; justify-content:center;">
        <div class="mini-card" onclick="show('details')">
            <img src="https://i.imgur.com/K3pWpXG.png">
            <h4>XENO EXECUTOR</h4>
            <p style="color:var(--pink); font-weight:900; margin:10px 0;">0.00 SAR <span style="text-decoration:line-through; color:grey; font-size:12px;">22.00 SAR</span></p>
            <button class="btn-main" onclick="event.stopPropagation(); addToCart('XENO EXECUTOR', '0.00')">إضافة للسلة</button>
        </div>
    </div>
</section>

<section id="details-page">
    <div style="background:var(--card); padding:40px; border-radius:25px; max-width:1000px; width:100%;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:40px;">
            <img src="https://i.imgur.com/K3pWpXG.png" style="width:100%; border-radius:20px;">
            <div>
                <h1 style="color:var(--pink);">XENO EXECUTOR V2</h1>
                <p style="line-height:1.8; margin:20px 0; color:#aaa;">
                    أداة التنفيذ الأسرع والأكثر أماناً في عالم الألعاب. تخطي كامل للحماية مع واجهة برمجية متطورة تدعم كافة السكربتات الحديثة.
                </p>
                <div class="star-rating" id="starInput">
                    <i class="fas fa-star" onclick="setStars(1)"></i>
                    <i class="fas fa-star" onclick="setStars(2)"></i>
                    <i class="fas fa-star" onclick="setStars(3)"></i>
                    <i class="fas fa-star" onclick="setStars(4)"></i>
                    <i class="fas fa-star" onclick="setStars(5)"></i>
                </div>
                <input type="text" id="revTxt" style="width:100%; padding:12px; background:#0b0416; border:1px solid #333; color:white; border-radius:10px;" placeholder="اكتب مراجعتك هنا...">
                <button class="btn-main" style="margin-top:15px;" onclick="addReview()">نشر التقييم</button>
            </div>
        </div>
        <h3 style="margin-top:50px; border-bottom:1px solid #333; padding-bottom:15px;">آراء الأصدقاء <i class="fas fa-heart" style="color:var(--pink);"></i></h3>
        <div id="revList" style="margin-top:30px; display: flex; flex-direction: column; align-items: center;"></div>
    </div>
</section>

<section id="checkout-page">
    <div class="card" style="max-width:500px; text-align:center;">
        <h2 style="color:var(--pink); margin-bottom:25px;">بوابة الدفع الآمنة</h2>
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px; font-size:30px; color:#aaa;">
            <i class="fab fa-apple-pay"></i> <i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i>
        </div>
        <input type="text" placeholder="رقم البطاقة" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white;">
        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="MM/YY" style="width:50%; padding:12px; background:#000; border:1px solid #333; color:white;">
            <input type="text" placeholder="CVV" style="width:50%; padding:12px; background:#000; border:1px solid #333; color:white;">
        </div>
        <button class="btn-main" style="margin-top:20px;" onclick="customAlert('شكراً لك! تم معالجة الطلب بنجاح')">دفع الآن</button>
        <p onclick="show('home')" style="margin-top:15px; cursor:pointer; font-size:12px;">إلغاء والعودة للمتجر</p>
    </div>
</section>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWVnf3CKX2d8wI0NPATsqkLhmBabCgaB4",
        authDomain: "swiftvoid-3e5a6.firebaseapp.com",
        databaseURL: "https://swiftvoid-3e5a6-default-rtdb.firebaseio.com",
        projectId: "swiftvoid-3e5a6",
        storageBucket: "swiftvoid-3e5a6.firebasestorage.app",
        messagingSenderId: "375536130124",
        appId: "1:375536130124:web:a4ff59516a08b66da2fce9",
        measurementId: "G-H70SQC4CHX"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let selectedStars = 5;

    function customAlert(msg) {
        const a = document.getElementById('siteAlert');
        a.innerText = msg; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 3000);
    }

    async function handleAuth() {
        const e = document.getElementById('uEmail').value;
        const p = document.getElementById('uPass').value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
            start();
        } catch {
            try {
                await auth.createUserWithEmailAndPassword(e, p);
                start();
            } catch { customAlert("خطأ: تأكد من بيانات الحساب"); }
        }
    }

    function start() {
        document.getElementById('bodyTag').classList.remove('matrix-bg');
        document.getElementById('auth-page').classList.remove('active');
        document.getElementById('navbar').style.display = 'flex';
        show('home');
        loadReviews();
    }

    function show(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-page').classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }

    function addToCart(n, p) {
        const items = document.getElementById('cartItems');
        if(items.innerHTML.includes('فارغة')) items.innerHTML = "";
        items.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;"><span>${n}</span><span>${p} SAR</span></div>`;
        customAlert("تمت إضافة المنتج للسلة!");
    }

    function setStars(n) {
        selectedStars = n;
        const stars = document.getElementById('starInput').children;
        for(let i=0; i<5; i++) stars[i].style.color = (i < n) ? '#ffcc00' : '#444';
    }

    function loadReviews() {
        db.ref('store_reviews').on('value', snap => {
            const list = document.getElementById('revList');
            list.innerHTML = "";
            if(snap.val()) {
                Object.values(snap.val()).reverse().forEach(r => {
                    let s = ""; for(let i=0; i<r.stars; i++) s += "⭐";
                    list.innerHTML += `<div class="rev-card"><b>مستخدم VOID</b> <span style="font-size:12px; color:grey;">${s}</span><p style="margin-top:10px; color:#ccc;">${r.text}</p></div>`;
                });
            }
        });
    }

    function addReview() {
        const t = document.getElementById('revTxt').value;
        if(!t) return;
        db.ref('store_reviews').push({ text: t, stars: selectedStars });
        document.getElementById('revTxt').value = "";
        customAlert("شكراً لتقييمك!");
    }
</script>
</body>
</html>
